name: Post
description: Add or edit a post
title: "[POST] "
labels:
  - post
body:
  - type: input
    id: trip
    attributes:
      label: Trip name
      placeholder: "Europe 2024"
    validations:
      required: true

  - type: input
    id: location_name
    attributes:
      label: Location name
      placeholder: "Rome, Italy"
    validations:
      required: true

  - type: input
    id: lat
    attributes:
      label: Latitude
      placeholder: "41.8967"
    validations:
      required: true

  - type: input
    id: lng
    attributes:
      label: Longitude
      placeholder: "12.4822"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Post title
      placeholder: "Colosseum visit"
    validations:
      required: true

  - type: textarea
    id: text
    attributes:
      label: Post text

  - type: textarea
    id: photos
    attributes:
      label: Photo URLs (one per line)
      placeholder: |
        https://example.com
        https://example.com

  - type: input
    id: date
    attributes:
      label: Date
      placeholder: "2024-06-01"
