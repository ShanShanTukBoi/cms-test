name: Post
description: Add or edit a post
title: '[POST]'
labels:
- post
body:
- type: dropdown
  id: location_name
  attributes:
    label: Location
    options:
    - Melbourne, Australia
    - Rome, Italy
    - Chianti, Italy
    - Chamonix, France
    - Torla-Ordesa, Spain
    - Madrid, Spain
    - Granada, Spain
    - Other (Please specify below)
  validations:
    required: true
- type: markdown
  attributes:
    value: "### New Location Details (Required if 'Other' selected above)"
- type: input
  id: new_location
  attributes:
    label: New Location
    description: Enter the location name here. (Required if 'Other' selected)
    placeholder: e.g., Bejing, China
  validations:
    required: false
- type: input
  id: lat
  attributes:
    label: Latitude
    description: Enter the latitude here. (Required if 'Other' selected)
    placeholder: '41.8967'
  validations:
    required: false
- type: input
  id: lng
  attributes:
    label: Longitude
    description: Enter the longitude here. (Required if 'Other' selected)
    placeholder: '12.4822'
  validations:
    required: false
- type: input
  id: title
  attributes:
    label: Post title
    placeholder: Colosseum visit
  validations:
    required: true
- type: textarea
  id: text
  attributes:
    label: Post text
- type: textarea
  id: photos
  attributes:
    label: Photo URLs (one per line)
    placeholder: 'https://example.com

      https://example.com

      '
- type: input
  id: date
  attributes:
    label: Date
    placeholder: '2024-06-01'
