backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - label: "Travel Data"
    name: "travel"
    files:
      - label: "Locations & Posts"
        name: "locations"
        file: "posts/trips.json"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"

          - label: "Locations"
            name: "locations"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Lat", name: "lat", widget: "number" }
              - { label: "Lng", name: "lng", widget: "number" }

              - label: "Posts"
                name: "posts"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - label: "Photos"
                    name: "photos"
                    widget: "list"
                    field:
                      { label: "Photo URL", name: "photo", widget: "string" }