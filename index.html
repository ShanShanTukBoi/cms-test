<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Travel Posts</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      line-height: 1.6;
    }
    .trip {
      margin-top: 50px;
    }
    .location {
      margin-top: 30px;
    }
    .post {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .photos img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 6px;
    }
    .comments {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Travel Posts</h1>
  <div id="app"></div>

  <script>
    const REPO = "ShanShanTukBoi/cms-test";

    function createUtterancesElement(issueNumber) {
      const script = document.createElement("script");
      script.src = "https://utteranc.es/client.js";
      script.setAttribute("repo", REPO);
      script.setAttribute("issue-number", issueNumber);
      script.setAttribute("theme", "github-light");
      script.setAttribute("crossorigin", "anonymous");
      script.async = true;
      return script;
    }

    async function loadData() {
      const res = await fetch('./data/trips.json');
      const data = await res.json();

      const app = document.getElementById('app');

      data.forEach(trip => {
        const tripEl = document.createElement('div');
        tripEl.className = 'trip';

        tripEl.innerHTML = `<h1>${trip.title}</h1>`;

        trip.locations.forEach(location => {
          if (!location.posts || location.posts.length === 0) return;

          const locationEl = document.createElement('div');
          locationEl.className = 'location';

          locationEl.innerHTML = `
            <h2>${location.name}</h2>
            <p>Lat: ${location.lat}, Lng: ${location.lng}</p>
          `;

          location.posts.forEach(post => {
            const postEl = document.createElement('div');
            postEl.className = 'post';

            let photosHTML = '';
            if (post.photos && post.photos.length) {
              photosHTML = `
                <div class="photos">
                  ${post.photos.map(url => `<img src="${url}" />`).join('')}
                </div>
              `;
            }

            postEl.innerHTML = `
              <h3>${post.title}</h3>
              <p>${post.text || ''}</p>
              ${photosHTML}
            `;

            // 👉 Comments container
            const commentsEl = document.createElement('div');
            commentsEl.className = 'comments';

            // 👉 Load Utterances for this post
            const utterancesScript = createUtterancesElement(post.id);
            commentsEl.appendChild(utterancesScript);

            postEl.appendChild(commentsEl);
            locationEl.appendChild(postEl);
          });

          tripEl.appendChild(locationEl);
        });

        app.appendChild(tripEl);
      });
    }

    loadData();
  </script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

</body>
</html>
